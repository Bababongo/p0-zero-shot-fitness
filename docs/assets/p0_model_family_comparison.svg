<circle cx="669.0" cy="266" r="7" fill="#1f1f1f"/>
<text x="205" y="308" text-anchor="end" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#65746d">ProteinMPNN</text>
<line x1="315" y1="302" x2="1120" y2="302" stroke="#b9ad9c" stroke-width="1" opacity="0.45"/>
<rect x="315" y="292" width="719.8" height="20" rx="10" fill="#b55b32"/>
<text x="1044.8" y="307" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#17201c">0.626</text>
<circle cx="1027.7" cy="302" r="7" fill="#ffffff" stroke="#b55b32" stroke-width="2"/>
<circle cx="612.1" cy="302" r="7" fill="#1f1f1f"/>
<rect x="1160" y="212" width="282" height="82" rx="18" fill="#eee9df" stroke="#b9ad9c" stroke-width="1"/>
<text x="1183" y="238" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#17201c">Read</text>
<text x="1183" y="261" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#65746d">
<tspan x="1183" dy="0">ProteinMPNN wins overall,</tspan>
<tspan x="1183" dy="17">but drops at metal-site</tspan>
<tspan x="1183" dy="17">residues.</tspan>
</text>
<text x="58" y="404" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#17201c">AMIE</text>
<text x="58" y="430" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#65746d">aliphatic amidase</text>
<text x="205" y="404" text-anchor="end" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#65746d">ESM-2</text>
<line x1="315" y1="398" x2="1120" y2="398" stroke="#b9ad9c" stroke-width="1" opacity="0.45"/>
<rect x="315" y="388" width="469.4" height="20" rx="10" fill="#2c7fb8"/>
<text x="794.4" y="403" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#17201c">0.408</text>
