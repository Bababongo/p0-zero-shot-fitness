<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860" role="img" aria-labelledby="title desc">
<title id="title">P0 model-family comparison</title>
<desc id="desc">A comparison of ESM-2, MSA conservation, and ProteinMPNN Spearman correlations across VIM-2, AMIE, and beta-glucosidase.</desc>
<rect width="1500" height="860" rx="28" fill="#f8f5ee"/>
<text x="58" y="66" font-family="Inter, Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#17201c">P0 model-family comparison</text>
<text x="58" y="103" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" fill="#65746d">Same DMS assays, same mechanism labels, different biological inductive biases.</text>
<text x="58" y="145" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5" fill="#65746d">OVERALL BARS + EXACT CATALYTIC/METAL-SITE DOTS</text>
<rect x="58" y="170" width="32" height="14" rx="7" fill="#2c7fb8"/>
<text x="100" y="181" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#65746d">ESM-2</text>
<rect x="213" y="170" width="32" height="14" rx="7" fill="#5a7d38"/>
<text x="255" y="181" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#65746d">MSA</text>
<rect x="368" y="170" width="32" height="14" rx="7" fill="#b55b32"/>
<text x="410" y="181" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#65746d">ProteinMPNN</text>
<circle cx="555" cy="177" r="7" fill="#1f1f1f"/>
<text x="570" y="181" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#65746d">exact catalytic or metal-site Spearman</text>
<line x1="315.0" y1="206" x2="315.0" y2="735" stroke="#d8d1c5" stroke-width="1"/>
<text x="315.0" y="765" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#65746d">0.00</text>
<line x1="602.5" y1="206" x2="602.5" y2="735" stroke="#d8d1c5" stroke-width="1"/>
<text x="602.5" y="765" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#65746d">0.25</text>
<line x1="890.0" y1="206" x2="890.0" y2="735" stroke="#d8d1c5" stroke-width="1"/>
<text x="890.0" y="765" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#65746d">0.50</text>
<line x1="1120.0" y1="206" x2="1120.0" y2="735" stroke="#d8d1c5" stroke-width="1"/>
<text x="1120.0" y="765" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#65746d">0.70</text>
<text x="717.5" y="795" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#65746d">Spearman correlation against experimental DMS fitness</text>
<text x="58" y="236" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#17201c">VIM-2</text>
<text x="58" y="262" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#65746d">metallo-beta-lactamase</text>
<text x="205" y="236" text-anchor="end" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#65746d">ESM-2</text>
<line x1="315" y1="230" x2="1120" y2="230" stroke="#b9ad9c" stroke-width="1" opacity="0.45"/>
<rect x="315" y="220" width="607.1" height="20" rx="10" fill="#2c7fb8"/>
<text x="932.1" y="235" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#17201c">0.528</text>
<circle cx="899.8" cy="230" r="7" fill="#ffffff" stroke="#2c7fb8" stroke-width="2"/>
<circle cx="711.6" cy="230" r="7" fill="#1f1f1f"/>
<text x="205" y="272" text-anchor="end" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#65746d">MSA</text>
<line x1="315" y1="266" x2="1120" y2="266" stroke="#b9ad9c" stroke-width="1" opacity="0.45"/>
<rect x="315" y="256" width="567.0" height="20" rx="10" fill="#5a7d38"/>
<text x="892.0" y="271" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#17201c">0.493</text>
