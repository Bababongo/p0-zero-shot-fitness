<text x="205" y="440" text-anchor="end" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#65746d">MSA</text>
<line x1="315" y1="434" x2="1120" y2="434" stroke="#b9ad9c" stroke-width="1" opacity="0.45"/>
<rect x="315" y="424" width="495.2" height="20" rx="10" fill="#5a7d38"/>
<text x="820.2" y="439" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#17201c">0.431</text>
<circle cx="800.0" cy="434" r="7" fill="#ffffff" stroke="#5a7d38" stroke-width="2"/>
<circle cx="653.6" cy="434" r="7" fill="#1f1f1f"/>
<text x="205" y="476" text-anchor="end" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#65746d">ProteinMPNN</text>
<line x1="315" y1="470" x2="1120" y2="470" stroke="#b9ad9c" stroke-width="1" opacity="0.45"/>
<rect x="315" y="460" width="397.6" height="20" rx="10" fill="#b55b32"/>
<text x="722.6" y="475" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#17201c">0.346</text>
<circle cx="702.7" cy="470" r="7" fill="#ffffff" stroke="#b55b32" stroke-width="2"/>
<circle cx="621.1" cy="470" r="7" fill="#1f1f1f"/>
<rect x="1160" y="380" width="282" height="82" rx="18" fill="#eee9df" stroke="#b9ad9c" stroke-width="1"/>
<text x="1183" y="406" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#17201c">Read</text>
<text x="1183" y="429" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#65746d">
<tspan x="1183" dy="0">MSA is strongest overall;</tspan>
<tspan x="1183" dy="17">ProteinMPNN does not</tspan>
<tspan x="1183" dy="17">rescue catalysis.</tspan>
</text>
<text x="58" y="572" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#17201c">Beta-glucosidase</text>
<text x="58" y="598" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#65746d">GH1 glycoside hydrolase</text>
<text x="205" y="572" text-anchor="end" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#65746d">ESM-2</text>
<line x1="315" y1="566" x2="1120" y2="566" stroke="#b9ad9c" stroke-width="1" opacity="0.45"/>
<rect x="315" y="556" width="515.3" height="20" rx="10" fill="#2c7fb8"/>
<text x="840.3" y="571" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#17201c">0.448</text>
<circle cx="824.9" cy="566" r="7" fill="#ffffff" stroke="#2c7fb8" stroke-width="2"/>
<circle cx="902.1" cy="566" r="7" fill="#1f1f1f"/>
<text x="205" y="608" text-anchor="end" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#65746d">MSA</text>
<line x1="315" y1="602" x2="1120" y2="602" stroke="#b9ad9c" stroke-width="1" opacity="0.45"/>
<rect x="315" y="592" width="645.7" height="20" rx="10" fill="#5a7d38"/>
<text x="970.7" y="607" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#17201c">0.561</text>
<circle cx="957.2" cy="602" r="7" fill="#ffffff" stroke="#5a7d38" stroke-width="2"/>
<circle cx="821.6" cy="602" r="7" fill="#1f1f1f"/>
<text x="205" y="644" text-anchor="end" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#65746d">ProteinMPNN</text>
<line x1="315" y1="638" x2="1120" y2="638" stroke="#b9ad9c" stroke-width="1" opacity="0.45"/>
<rect x="315" y="628" width="416.0" height="20" rx="10" fill="#b55b32"/>
<text x="741.0" y="643" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#17201c">0.362</text>
<circle cx="725.7" cy="638" r="7" fill="#ffffff" stroke="#b55b32" stroke-width="2"/>
<circle cx="1046.8" cy="638" r="7" fill="#1f1f1f"/>
<rect x="1160" y="548" width="282" height="82" rx="18" fill="#eee9df" stroke="#b9ad9c" stroke-width="1"/>
<text x="1183" y="574" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#17201c">Read</text>
<text x="1183" y="597" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#65746d">
<tspan x="1183" dy="0">High exact-site score,</tspan>
<tspan x="1183" dy="17">but n is tiny and the</tspan>
<tspan x="1183" dy="17">broader shell is weak.</tspan>
</text>
<rect x="58" y="805" width="1384" height="42" rx="16" fill="#e7eee9" stroke="#b9ad9c" stroke-width="1"/>
<text x="84" y="831" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#17201c">Takeaway</text>
<text x="170" y="831" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#17201c">Global fitness ranking and mechanism-local behavior can diverge across model families.</text>
</svg>
